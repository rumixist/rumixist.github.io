name: OSM İl İstatistikleri

permissions:
  contents: write

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  guncelle:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Depoyu çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli kitaplıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: OSM il istatistiklerini üret
        run: python scripts/osm_istatistik.py

      - name: OSM son 90 gün değişikliklerini üret
        run: python scripts/osmi_degisiklik90.py

      # DEBUG
      - name: Git durumu
        run: |
          echo "---- GIT STATUS ----"
          git status
          echo "--------------------"

      - name: Değişiklik var mı bak
        run: |
          if git status --porcelain | grep .; then
            echo "degisiklik_var=true" >> $GITHUB_ENV
          else
            echo "degisiklik_var=false" >> $GITHUB_ENV
          fi

      - name: Commit + Push
        if: env.degisiklik_var == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add osmaraclari/ilizle/veri/iller.json
          git add osmaraclari/ilizle/veri/degisiklik_90gun.json

          git commit -m "OSM verileri güncellendi"

          git push

      # DEBUG
      - name: Değişiklik yok bildirimi
        if: env.degisiklik_var == 'false'
        run: echo "Dosyalarda değişiklik yok."
